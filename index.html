<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5041 CyBear Robotics Hours Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="brand-hero" aria-labelledby="pageTitle">
      <div class="brand-angle brand-angle-black" aria-hidden="true"></div>
      <div class="brand-angle brand-angle-red" aria-hidden="true"></div>

      <div class="brand-content">
        <div class="brand-copy">
          <h1 id="pageTitle">Hours Tracker</h1>
        </div>

        <div class="logo-panel" aria-label="5041 CyBear Robotics logo">
          <img src="assets/5041logo.png" alt="5041 CyBear Robotics logo" class="Team Logo" />
        </div>
      </div>

      <div class="hero-action-row">
        <span class="loading-bar" aria-hidden="true"></span>
        <button id="refreshBtn" class="secondary" type="button">Refresh entries</button>
      </div>
    </section>

    <section class="grid">
      <form id="hoursForm" class="card form-card">
        <div class="section-heading">
          <span class="corner-mark" aria-hidden="true"></span>
          <div>
            <h2>Time Entry</h2>
          </div>
        </div>

        <label>
          Name
          <select id="personName" name="personName" required>
            <option value="">Loading approved users...</option>
          </select>
        </label>

        <label>
          PIN
          <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="off" placeholder="Enter your PIN" required />
        </label>

        <label>
          Date
          <input id="workDate" name="workDate" type="date" required />
        </label>

        <div class="two-col">
          <label>
            Start time
            <input id="startTime" name="startTime" type="time" required />
          </label>

          <label>
            End time
            <input id="endTime" name="endTime" type="time" required />
          </label>
        </div>

        <label>
          Category / task
          <input id="task" name="task" type="text" placeholder="Build meeting, outreach, admin, shift..." />
        </label>

        <label>
          Notes
          <textarea id="notes" name="notes" rows="3" placeholder="Optional details"></textarea>
        </label>

        <div class="summary-box">
          <span>Calculated hours</span>
          <strong id="calculatedHours">0.00</strong>
        </div>

        <button type="submit">Save entry</button>
        <p id="formMessage" class="message" aria-live="polite"></p>
      </form>

      <section class="card entries-card">
        <div class="entries-header">
          <div class="section-heading compact-heading">
            <span class="corner-mark" aria-hidden="true"></span>
            <div>
              <p class="eyebrow small-eyebrow">Google Sheet Log</p>
              <h2>Recent entries</h2>
              <p class="muted small">Loaded from the connected Google Sheet.</p>
            </div>
          </div>

          <label class="filter-label">
            Filter by name
            <input id="nameFilter" type="text" placeholder="Optional" />
          </label>
        </div>

        <div class="totals">
          <div>
            <span>Total entries</span>
            <strong id="totalEntries">0</strong>
          </div>
          <div>
            <span>Total hours</span>
            <strong id="totalHours">0.00</strong>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Task</th>
                <th>Hours</th>
              </tr>
            </thead>
            <tbody id="entriesBody">
              <tr><td colspan="4" class="empty">No entries loaded yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>

    <iframe name="hiddenSubmitFrame" id="hiddenSubmitFrame" title="Hidden form submit target"></iframe>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
